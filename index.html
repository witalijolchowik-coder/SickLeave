<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SickLeave PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e2130; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b57db; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Достаем хуки из глобального объекта React
        const { useState, useEffect, useMemo } = React;

        // --- КОНФИГУРАЦИЯ FIREBASE ---
        // ВНИМАНИЕ: Замените это на ваши реальные данные из Firebase Console, если __firebase_config не определен
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "ВАШ_API_KEY",
                authDomain: "ВАШ_PROJECT.firebaseapp.com",
                projectId: "ВАШ_PROJECT_ID",
                storageBucket: "ВАШ_PROJECT.appspot.com",
                messagingSenderId: "ID",
                appId: "APP_ID"
            };

        // Инициализация Firebase (совместимый режим)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sick-leave-pro-polish-v1';

        // --- ИКОНКИ (Заглушка для Lucide-React в браузере) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconContent, setIconContent] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) return; // Lucide handles it via createIcons
                }
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const POLISH_HOLIDAYS = [
            "2025-01-01", "2025-01-06", "2025-04-20", "2025-04-21", "2025-05-01", "2025-05-03", "2025-06-08", "2025-06-19", "2025-08-15", "2025-11-01", "2025-11-11", "2025-12-25", "2025-12-26",
            "2026-01-01", "2026-01-06", "2026-04-05", "2026-04-06", "2026-05-01", "2026-05-03", "2026-05-24", "2026-06-04", "2026-08-15", "2026-11-01", "2026-11-11", "2026-12-25", "2026-12-26"
        ];

        const COMPANY_MAP = {
            'US': 'Ukrainian Service', 'PS': 'Personnel Service', 'PST': 'Personnel Support',
            'HS': 'Human Support', 'HCS': 'Human Capital Support', 'FS': 'Foreign Service',
            'BERGMAN': 'Bergman', 'RENESANS': 'Renesans'
        };

        // Основной компонент приложения
        const App = () => {
            // ... Вставляем всю логику из вашего кода (стейты, хелперы и т.д.) ...
            const [theme, setTheme] = useState('dark');
            const [user, setUser] = useState(null);
            const [employees, setEmployees] = useState([]);
            const [dbMetadata, setDbMetadata] = useState({});
            const [sickLeaveSheets, setSickLeaveSheets] = useState({}); 
            const [zusMetadata, setZusMetadata] = useState({ lastUpdated: '', fileDate: '', projectStats: {}, prevProjectStats: {} });
            const [processedData, setProcessedData] = useState([]);
            const [selectedProject, setSelectedProject] = useState('all');
            const [workHourMultiplier, setWorkHourMultiplier] = useState(8);
            const [isLibraryLoaded, setIsLibraryLoaded] = useState(false);
            const [loading, setLoading] = useState({ report: false, zus: false, processing: false, cloud: true, deleting: false });
            const [showDbSettings, setShowDbSettings] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
            const [modalMessage, setModalMessage] = useState(null);

            // Date Helpers
            const formatDateLocal = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const getDefaultDates = () => {
                const now = new Date();
                return { 
                    start: formatDateLocal(new Date(now.getFullYear(), now.getMonth(), 1)), 
                    end: formatDateLocal(new Date(now.getFullYear(), now.getMonth() + 1, 0)) 
                };
            };
            const [dateRange, setDateRange] = useState(getDefaultDates());

            const clean = (val) => String(val || "").trim();
            const onlyDigits = (val) => String(val || "").replace(/\D/g, '');

            const parseDate = (val) => {
                if (!val || val === '---') return null;
                if (val instanceof Date) return val;
                if (typeof val === 'number') {
                    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
                    d.setHours(0,0,0,0);
                    return isNaN(d.getTime()) ? null : d;
                }
                const s = clean(val);
                if (s.includes('.') && s.split('.').length === 3) {
                    const p = s.split('.');
                    const d = new Date(`${p[2]}-${p[1]}-${p[0]}`);
                    if (!isNaN(d.getTime())) { d.setHours(0,0,0,0); return d; }
                }
                const dIso = new Date(s);
                return !isNaN(dIso.getTime()) ? (dIso.setHours(0,0,0,0), dIso) : null;
            };

            const calculateWorkingDays = (start, end) => {
                const dStart = parseDate(start); const dEnd = parseDate(end);
                if (!dStart || !dEnd) return 0;
                let count = 0; let cur = new Date(dStart);
                while (cur <= dEnd) {
                    const day = cur.getDay();
                    const iso = cur.toISOString().split('T')[0];
                    if (day !== 0 && day !== 6 && !POLISH_HOLIDAYS.includes(iso)) count++;
                    cur.setDate(cur.getDate() + 1);
                }
                return count;
            };

            // Эффект для загрузки библиотек и авторизации
            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js";
                script.onload = () => {
                    setIsLibraryLoaded(true);
                    if (window.lucide) window.lucide.createIcons();
                };
                document.head.appendChild(script);

                auth.signInAnonymously().catch(e => console.error("Firebase Login Error"));
                const unsub = auth.onAuthStateChanged(setUser);
                return () => unsub();
            }, []);

            // Firebase Snapshots
            useEffect(() => {
                if (!user) return;
                const unsubEmp = db.doc(`artifacts/${appId}/public/data/registry/main_db`).onSnapshot(snap => {
                    if (snap.exists) {
                        const data = snap.data();
                        setEmployees(Array.isArray(data.list) ? data.list : []);
                        setDbMetadata(data.metadata || {});
                    }
                    setLoading(prev => ({ ...prev, cloud: false }));
                });

                const zusMetaRef = db.doc(`artifacts/${appId}/public/data/registry/zus_metadata`);
                const unsubZusMeta = zusMetaRef.onSnapshot(snap => {
                    if (snap.exists) {
                        const data = snap.data();
                        setZusMetadata({
                            lastUpdated: String(data.updatedAt || ''),
                            fileDate: String(data.fileModificationDate || ''),
                            projectStats: data.projectStats || {},
                            prevProjectStats: data.prevProjectStats || {}
                        });
                    }
                });

                const zusDataColl = db.collection(`artifacts/${appId}/public/data/zus_data`);
                const unsubZusData = zusDataColl.onSnapshot(snap => {
                    const allSheets = {};
                    snap.forEach(docSnap => {
                        try { allSheets[docSnap.id] = JSON.parse(docSnap.data().rows); } catch(e) {}
                    });
                    setSickLeaveSheets(allSheets);
                });

                return () => { unsubEmp(); unsubZusMeta(); unsubZusData(); };
            }, [user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [processedData, zusMetadata, stats, showDbSettings]);

            // Методы обработки данных (extractEntriesFromRow, handleReportUpload и др. такие же как в вашем коде)
            const extractEntriesFromRow = (cells) => {
                const results = [];
                if (!cells || cells.length < 3) return results;
                const rowString = cells.join('|');
                const peselMatches = rowString.match(/\d{11}/g);
                if (!peselMatches) return results;
                peselMatches.forEach(p => {
                    const colIdx = cells.findIndex(c => String(c).includes(p));
                    if (colIdx === -1) return;
                    if (cells[colIdx + 5] && String(cells[colIdx + 5]).includes(" - ")) {
                        const [start, end] = String(cells[colIdx + 5]).split(" - ");
                        results.push({ pesel: p, start, end, isOpieka: String(cells[colIdx + 6] || "").toUpperCase().includes('TAK'), isSzpital: !['NIE', '-', '', 'NO'].includes(String(cells[colIdx + 7] || "").toUpperCase()) });
                    } else if (cells[colIdx + 3] && cells[colIdx + 4]) {
                        results.push({ pesel: p, start: String(cells[colIdx + 3]), end: String(cells[colIdx + 4]), isOpieka: String(cells[colIdx + 5] || "").toUpperCase() === 'TAK', isSzpital: String(cells[colIdx + 6] || "").toUpperCase() === 'TAK' });
                    }
                });
                return results;
            };

            const processData = () => {
                setLoading(prev => ({ ...prev, processing: true }));
                const results = [];
                const fS = parseDate(dateRange.start); const fE = parseDate(dateRange.end);
                setTimeout(() => {
                    employees.forEach(emp => {
                        if (selectedProject !== 'all' && String(emp.project) !== selectedProject) return;
                        const target = (emp.shortCode !== "UNKNOWN" && sickLeaveSheets[emp.shortCode]) ? { [emp.shortCode]: sickLeaveSheets[emp.shortCode] } : sickLeaveSheets;
                        Object.entries(target).forEach(([sheetId, rows]) => {
                            rows.forEach(cells => {
                                const entries = extractEntriesFromRow(cells);
                                entries.forEach(info => {
                                    if (info.pesel === emp.cleanPesel) {
                                        const dS = parseDate(info.start); const dE = parseDate(info.end);
                                        if (dS && dE && (!fS || dE >= fS) && (!fE || dS <= fE)) {
                                            results.push({ proj: String(emp.project), comp: sheetId, name: emp.fullName, lastName: emp.lastName, firstName: emp.firstName, pesel: info.pesel, start: info.start, end: info.end, isOpieka: info.isOpieka, isSzpital: info.isSzpital });
                                        }
                                    }
                                });
                            });
                        });
                    });
                    const seen = new Set();
                    setProcessedData(results.sort((a,b) => (parseDate(b.start)||0)-(parseDate(a.start)||0)).filter(r => { const k=`${r.pesel}-${r.start}-${r.end}`; if(seen.has(k)) return false; seen.add(k); return true; }));
                    setLoading(prev => ({ ...prev, processing: false }));
                }, 600);
            };

            const projectsList = useMemo(() => {
                const list = employees.map(e => String(e.project || "")).filter(p => p && p !== 'N/A' && p !== 'undefined');
                return ['all', ...new Set(list)].sort();
            }, [employees]);

            const stats = useMemo(() => {
                const filtered = selectedProject === 'all' ? employees : employees.filter(e => e.project === selectedProject);
                const active = filtered.filter(e => !e.isArchived).length;
                const archived = filtered.filter(e => e.isArchived).length;
                const total = filtered.length;
                return { 
                    total, active, archived, 
                    activePct: total > 0 ? Math.round((active / total) * 100) : 0, 
                    archivedPct: total > 0 ? Math.round((archived / total) * 100) : 0 
                };
            }, [selectedProject, employees]);

            const zusDashboardData = useMemo(() => {
                const current = zusMetadata.projectStats || {};
                const prev = zusMetadata.prevProjectStats || {};
                const allProj = [...new Set([...Object.keys(current), ...Object.keys(prev)])].sort();
                return allProj.map(p => {
                    const cData = current[p] || { monthTotal: 0, activeNow: 0 };
                    const pData = prev[p] || { monthTotal: 0, activeNow: 0 };
                    return { project: String(p), month: cData.monthTotal, active: cData.activeNow, diff: cData.activeNow - pData.activeNow };
                }).filter(d => d.month > 0 || d.active > 0 || d.diff !== 0);
            }, [zusMetadata]);

            if (!isLibraryLoaded) return <div className="h-screen flex items-center justify-center bg-[#1e2130]"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-white"></div></div>;

            return (
                <div className={theme === 'dark' ? 'dark text-white' : 'text-slate-900'}>
                    <div className="min-h-screen bg-gradient-to-br from-[#0a0c14] via-[#141726] to-[#0a0c14] flex items-center justify-center p-4">
                        <div className="flex w-full max-w-[1400px] h-[850px] bg-[#1e2130] rounded-2xl shadow-2xl overflow-hidden border border-gray-700">
                            <main className="flex-1 flex flex-col overflow-hidden">
                                <header className="h-20 flex items-center justify-between px-8 border-b border-gray-800 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center"><i data-lucide="shield-check"></i></div>
                                        <div className="flex items-baseline gap-2">
                                            <h1 className="text-2xl font-semibold tracking-tight italic">SickLeave</h1>
                                            <span className="text-xl font-light text-[#94a3b8]">PRO</span>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setShowDbSettings(true)} className="flex items-center gap-2 bg-[#262a3b] hover:bg-[#32364a] text-white px-4 py-2 rounded-lg text-sm border border-gray-700 transition-all">
                                            <i data-lucide="folder-sync" className="w-4 h-4"></i> Aktualizuj Rejestr
                                        </button>
                                        <div className="flex items-center bg-[#262a3b] rounded-full p-1 border border-gray-700">
                                            <button onClick={() => setTheme('light')} className={`p-1.5 rounded-full ${theme === 'light' ? 'bg-gray-600' : 'text-gray-400'}`}><i data-lucide="sun" className="w-4 h-4"></i></button>
                                            <button onClick={() => setTheme('dark')} className={`p-1.5 rounded-full ${theme === 'dark' ? 'bg-gray-600' : 'text-gray-400'}`}><i data-lucide="moon" className="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                </header>

                                <div className="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-6">
                                    {/* Stats and Filter sections based on your code */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-[#262a3b] rounded-xl p-5 border border-gray-700">
                                            <h2 className="text-lg font-medium mb-4">Wybór Projektu</h2>
                                            <select value={selectedProject} onChange={(e) => setSelectedProject(e.target.value)} className="w-full bg-[#1e2130] border border-gray-600 rounded-lg p-2.5 text-sm">
                                                <option value="all">Wszystkie Projekты ({projectsList.length - 1})</option>
                                                {projectsList.filter(p => p !== 'all').map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>

                                        <div className="bg-[#262a3b] rounded-xl p-5 border border-gray-700">
                                            <h2 className="text-lg font-medium mb-2">Rejestr: {stats.total}</h2>
                                            <div className="flex gap-4">
                                                <div className="flex-1 bg-[#1e2130] p-2 rounded text-center"><p className="text-[10px] text-gray-400">AKTYWNI</p><p className="font-bold">{stats.active}</p></div>
                                                <div className="flex-1 bg-[#1e2130] p-2 rounded text-center"><p className="text-[10px] text-gray-400">ARCHIWUM</p><p className="font-bold">{stats.archived}</p></div>
                                            </div>
                                        </div>

                                        <div className="bg-[#262a3b] rounded-xl p-5 border border-gray-700">
                                            <h2 className="text-lg font-medium mb-4">Okres</h2>
                                            <div className="flex gap-2">
                                                <input type="date" value={dateRange.start} onChange={e => setDateRange(p => ({...p, start: e.target.value}))} className="bg-[#1e2130] border border-gray-600 rounded p-1 text-xs w-full" style={{colorScheme:'dark'}}/>
                                                <input type="date" value={dateRange.end} onChange={e => setDateRange(p => ({...p, end: e.target.value}))} className="bg-[#1e2130] border border-gray-600 rounded p-1 text-xs w-full" style={{colorScheme:'dark'}}/>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Main Table Area */}
                                    <div className="bg-[#262a3b] rounded-xl border border-gray-700 p-6">
                                        <button onClick={processData} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl mb-6 transition-all flex items-center justify-center gap-2">
                                            <i data-lucide="search"></i> SZUKAJ ZWOLNIEŃ
                                        </button>

                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead>
                                                    <tr className="text-[10px] text-gray-400 uppercase tracking-wider border-b border-gray-700">
                                                        <th className="pb-3 px-2">Pracownik</th>
                                                        <th className="pb-3 px-2 text-center">Data Od</th>
                                                        <th className="pb-3 px-2 text-center">Data Do</th>
                                                        <th className="pb-3 px-2 text-center">Firma</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-800">
                                                    {processedData.map((r, i) => (
                                                        <tr key={i} className="hover:bg-gray-800/50">
                                                            <td className="py-4 px-2">
                                                                <div className="font-bold text-sm">{r.name}</div>
                                                                <div className="text-[10px] text-gray-400">{r.proj}</div>
                                                            </td>
                                                            <td className="py-4 px-2 text-center"><span className="bg-blue-900/30 text-blue-400 px-2 py-1 rounded text-xs font-mono">{r.start}</span></td>
                                                            <td className="py-4 px-2 text-center"><span className="bg-red-900/30 text-red-400 px-2 py-1 rounded text-xs font-mono">{r.end}</span></td>
                                                            <td className="py-4 px-2 text-center text-[10px] text-gray-500 font-bold">{r.comp}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
